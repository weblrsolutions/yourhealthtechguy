# Starter RSS feeds for HTC News (Health Tech Circle's News)
# Add or remove entries freely; ingest reads this file each run.

feeds:
  # Trade press
  - name: MedTech Dive
    url: https://www.medtechdive.com/feeds/news/
    group: trade

  # MobiHealthNews RSS is often malformed; skip until a stable URL is known
  # - name: MobiHealthNews
  #   url: https://www.mobihealthnews.com/home/rss
  #   group: trade

  - name: Fierce Biotech
    url: https://www.fiercebiotech.com/rss/biotech/xml
    group: trade

  - name: Fierce MedTech
    url: https://www.fiercebiotech.com/rss/medtech/xml
    group: trade

  # General tech (health angle filtered downstream)
  - name: STAT News
    url: https://www.statnews.com/feed/
    group: trade

  - name: MIT Technology Review
    url: https://www.technologyreview.com/feed/
    group: tech

  - name: The Verge
    url: https://www.theverge.com/rss/index.xml
    group: tech

  - name: Ars Technica
    url: https://feeds.arstechnica.com/arstechnica/index
    group: tech

  # Research / preprints
  - name: arXiv q-bio
    url: https://rss.arxiv.org/rss/q-bio
    group: research

  # Filtered for health keywords (cs.AI is broad)
  - name: arXiv cs.AI
    url: https://rss.arxiv.org/rss/cs.AI
    group: tech

  # Prefer a saved-search RSS from pubmed.ncbi.nlm.nih.gov (Create RSS link on results)
  # - name: PubMed digital health
  #   url: https://pubmed.ncbi.nlm.nih.gov/rss/search/YOUR_SAVED_ID/
  #   group: research

  # Government / regulatory
  # FDA feed may fail on some corporate SSL MITM setups; works on GitHub Actions
  - name: FDA Newsroom
    url: https://www.fda.gov/about-fda/contact-fda/stay-informed/rss-feeds/press-releases/rss.xml
    group: regulatory

  - name: WHO News
    url: https://www.who.int/rss-feeds/news-english.xml
    group: regulatory

  # --- Regions: Global, India, and top 5 digital-health markets ---
  # Top 5 by digital-health market scale: US, China, UK, Germany, Japan (+ India focus)

  - name: Google News Digital Health Global
    url: https://news.google.com/rss/search?q=%22digital+health%22+OR+medtech+OR+%22health+technology%22+OR+telehealth&hl=en&gl=US&ceid=US:en
    group: country
    country: GLOBAL

  - name: Google News Digital Health India
    url: https://news.google.com/rss/search?q=%22digital+health%22+OR+medtech+OR+Ayushman+OR+telemedicine+OR+%22health+tech%22&hl=en-IN&gl=IN&ceid=IN:en
    group: country
    country: IN

  # --- India deep coverage (dedicated sources + targeted searches) ---
  # Dedicated Indian health-tech trade press (treated as trade → all health stories kept)
  - name: ETHealthworld Top Stories
    url: https://health.economictimes.indiatimes.com/rss/topstories
    group: trade
    country: IN

  - name: ETHealthworld Health IT
    url: https://health.economictimes.indiatimes.com/rss/health-it
    group: trade
    country: IN

  - name: ETHealthworld Medical Devices
    url: https://health.economictimes.indiatimes.com/rss/medical-devices
    group: trade
    country: IN

  - name: Express Healthcare India
    url: https://www.expresshealthcare.in/feed/
    group: trade
    country: IN

  # General daily (country group → digital/health filter trims non-tech noise)
  - name: The Hindu Health
    url: https://www.thehindu.com/sci-tech/health/feeder/default.rss
    group: country
    country: IN

