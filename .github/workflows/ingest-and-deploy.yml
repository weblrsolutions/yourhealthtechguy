name: Ingest & Deploy

on:
  schedule:
    # Every 6 hours UTC: 00:00, 06:00, 12:00, 18:00
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/articles.json"
      - ".github/workflows/ingest-and-deploy.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    # Skip ingest on pure site pushes unless manually/scheduled
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run ingest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RETENTION_DAYS: "120"
          MAX_NEW_PER_RUN: "80"
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python scripts/ingest.py

      - name: Commit articles if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          if git diff --staged --quiet; then
            echo "No article changes"
          else
            git commit -m "chore: update articles from scheduled ingest"
            git push
          fi

  build:
    runs-on: ubuntu-latest
    needs: [ingest]
    if: always() && (needs.ingest.result == 'success' || needs.ingest.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pick up commit from ingest job when it ran
          ref: ${{ github.ref }}

      - name: Re-checkout latest main after ingest
        if: needs.ingest.result == 'success'
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site deps
        working-directory: site
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Copy articles into site public
        run: |
          mkdir -p site/public
          cp data/articles.json site/public/articles.json

      - name: Build site
        working-directory: site
        env:
          # For project pages: /<repo>/  — set repo name via github.event.repository.name
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
